packages:
  "framer-motion": "For smooth page transitions and component reveals"
  "react-hook-form": "For robust form handling"
  "@hookform/resolvers": "For Zod validation integration with forms"
  "date-fns": "For formatting dates in market prices and profiles"
  "lucide-react": "For beautiful consistent icons"

images:
