kind = "web"
previewPath = "/"
title = "Marché Agricole Algérien"
version = "1.0.0"
id = "artifacts/agri-market"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19061

[services.development]
run = "pnpm --filter @workspace/agri-market run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/agri-market", "run", "build" ]
publicDir = "artifacts/agri-market/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19061"
BASE_PATH = "/"
